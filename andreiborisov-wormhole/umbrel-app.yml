manifestVersion: 1
id: andreiborisov-wormhole
category: networking
name: Wormhole
version: '1'
tagline: Censorship-resistant transparent VPN tunnel
description: >-
  Wormhole runs sing-box as a local tunnel node that intercepts DNS, returns fake IPs for proxied domains, and forwards matching traffic through an encrypted Hysteria2 tunnel to an unrestricted peer — transparently, with no per-app configuration on client devices.
  
  
  The node is provisioned and configured externally via Ansible. This app just runs the sing-box container; the configuration file must be placed in the app data directory before starting.


developer: Andrei Borisov
website: https://github.com/andreiborisov/wormhole
